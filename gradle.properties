# Increase the JVM heap so large Gradle builds don't run out of memory
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use the AndroidX library namespace (required for modern Android)
android.useAndroidX=true

# Kotlin code style
kotlin.code.style=official

# Avoids generating R references that include transitive dependencies
android.nonTransitiveRClass=true
